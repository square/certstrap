name: CI

on: [push, pull_request]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true
      id: go

    - name: Run tests
      run: GODEBUG=x509sha1=1 go test -v ./...

    - name: Build binaries
      run: go build -o . ./...

    - name: Run integration tests
      run: GODEBUG=x509sha1=1 go test -v -tags=integration ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v6

      with:
        # Exclude deprecated PEM functions from the linter until
        # https://github.com/square/certstrap/issues/124 is resolved
        args: --exclude '(De|En)cryptPEMBlock'

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'
        check-latest: true
      id: go

    - name: Run tests
      run: |
        set GODEBUG=x509sha1=1
        go test -v ./...

    - name: Build binaries
      run: go build -o . ./...

    - name: Run integration tests
      run: |
        set GODEBUG=x509sha1=1
        go test -v -tags=integration ./...
